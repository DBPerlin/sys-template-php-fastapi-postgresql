# Proxy reverso para o backend FastAPI
# /api/vivencias/...  -> backend:8000/vivencias/...
# /api/core/...       -> backend:8000/core/...

ProxyRequests Off
ProxyPreserveHost Off
ProxyTimeout 60

<Proxy *>
    Require all granted
</Proxy>

ProxyPass        /api/ http://backend:8000/
ProxyPassReverse /api/ http://backend:8000/
