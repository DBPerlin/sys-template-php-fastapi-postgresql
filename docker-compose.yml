services:
  backend:
    image: vivencias-backend:latest
    build: ./backend
    container_name: vivencias-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    expose:
      - "8000"
    volumes:
      - ./backend/uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          memory: 256M

  web:
    image: vivencias-web:latest
    build: ./web
    container_name: vivencias-web
    restart: unless-stopped
    ports:
      - "8012:80"
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M
