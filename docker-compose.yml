version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: template-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_padrao}
      POSTGRES_DB: ${POSTGRES_DB:-template_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: template-backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-senha_padrao}@db:5432/${POSTGRES_DB:-template_db}
    depends_on:
      - db

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: template-web
    restart: always
    volumes:
      - ./web/src:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db
      - backend

volumes:
  postgres_data:
